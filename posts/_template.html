<body>

<!-- Floating background shapes -->
<div class="bg-shapes" aria-hidden="true">
  <div class="bg-shape bg-shape--1"></div>
  <div class="bg-shape bg-shape--2"></div>
</div>

<!-- Header -->
<header class="site-header">
  <div class="site-header__inner">
    <a href="../index.html" class="site-header__logo">
      <span class="logo-mark">敗</span>
      <span>敗走録</span>
    </a>
    <nav class="site-header__nav">
      <a href="../index.html">トップ</a>
      <a href="../archive.html">アーカイブ</a>

    <div class="site-header__actions">
      <button class="theme-toggle" aria-label="テーマ切替">☀</button>
      <button class="menu-btn" aria-label="メニュー">
        <span></span><span></span><span></span>
      </button>
    </div>
  </div>
</header>

<!-- Post -->
<main>
  <header class="post-header">
    <!-- EDIT: タイトル -->
    <h1 class="post-header__title">記事タイトル</h1>
    <div class="post-header__meta">
      <!-- EDIT: 日付 -->
      <time class="post-header__date" datetime="YYYY-MM-DD">YYYY年MM月DD日</time>
    </div>
    <!-- EDIT: タグ（failure / learning / thought / tech / life） -->
    <div class="post-header__tags">
      <span class="tag tag--failure">失敗</span>
    </div>
    <div class="post-header__line"></div>
  </header>

  <article class="post-body">
    <!-- EDIT: ここに記事本文を書く -->
    <p>本文をここに書いてください。</p>

    <h2>見出し</h2>
    <p>段落のテキスト。</p>

    <blockquote>
      <p>引用テキスト。</p>
    </blockquote>
  </article>

  <nav class="post-nav">
    <!-- EDIT: 前後の記事リンク -->
    <a href="#" class="post-nav__prev">&larr; 前の記事</a>
    <a href="../archive.html" class="post-nav__archive">アーカイブ</a>
    <a href="#" class="post-nav__next">次の記事 &rarr;</a>
  </nav>
</main>

<footer class="site-footer">
